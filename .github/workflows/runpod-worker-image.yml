name: Build RunPod Worker Image

on:
  workflow_dispatch:
  push:
    branches:
      - runpod-worker-image
    paths:
      - "runpod-worker/**"
      - ".github/workflows/runpod-worker-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./runpod-worker
          push: true
          tags: |
            ghcr.io/steph30400-spec/nobiliview-runpod-worker:latest
            ghcr.io/steph30400-spec/nobiliview-runpod-worker:${{ github.sha }}
